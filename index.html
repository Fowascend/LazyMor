<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GrimPot Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-card {
            background: rgba(20, 20, 40, 0.95);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            border: 1px solid #2a2a4a;
        }
        .login-card h1 {
            color: #00aaff;
            text-align: center;
            margin-bottom: 30px;
        }
        .form-control {
            background: #1a1a2e;
            border: 1px solid #2a2a4a;
            color: white;
            padding: 12px;
        }
        .btn-primary {
            background: #00aaff;
            border: none;
            width: 100%;
            padding: 12px;
            font-weight: bold;
        }
        .error {
            color: #ff4444;
            text-align: center;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>🔐 GrimPot</h1>
        <form id="loginForm">
            <div class="mb-3">
                <input type="password" class="form-control" id="apiKey" placeholder="Enter API Key" required>
            </div>
            <button type="submit" class="btn btn-primary">Login</button>
        </form>
        <div id="errorMsg" class="error"></div>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const apiKey = document.getElementById('apiKey').value;
            if (apiKey) {
                localStorage.setItem('grimpot_auth', 'true');
                window.location.href = 'dashboard.html';
            } else {
                document.getElementById('errorMsg').innerText = 'Please enter an API key';
            }
        });
    </script>
</body>
</html>
